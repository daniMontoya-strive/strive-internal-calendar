<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strive Internal Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300..700&display=swap" rel="stylesheet">
<style>
:root {
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'DM Sans', 'Helvetica Neue', sans-serif;

  --btc: #F7931A;
  --btc-dim: rgba(247,147,26,0.14);

  --bg:        #0D0D0D;
  --surface:   #161616;
  --surface-2: #1E1E1E;
  --surface-3: #262626;
  --border:    rgba(255,255,255,0.08);
  --border-hi: rgba(255,255,255,0.14);

  --text:      #EDEDED;
  --text-muted:#8A8A8A;
  --text-faint:#4A4A4A;

  --green: #3ECF8E;
  --blue:  #4D9DE0;

  --radius-sm: 5px;
  --radius-md: 8px;
  --radius-lg: 14px;

  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px; --s8:32px; --s10:40px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { -webkit-font-smoothing:antialiased; }
body {
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  height:100dvh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  font-size:16px;
}
button { cursor:pointer; border:none; background:none; font:inherit; color:inherit; }

/* HEADER */
.header {
  flex-shrink:0;
  border-bottom:1px solid var(--border);
  padding:14px 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  background:var(--bg);
}
.logo { display:flex; align-items:center; gap:12px; }
.logo svg { width:34px; height:34px; flex-shrink:0; }
.logo-text { font-family:var(--font-display); font-size:1.3rem; line-height:1; letter-spacing:-0.01em; }
.logo-text span {
  display:block; font-family:var(--font-body); font-size:0.65rem; font-weight:500;
  color:var(--text-muted); letter-spacing:0.12em; text-transform:uppercase; margin-top:3px;
}

.year-nav { display:flex; align-items:center; gap:18px; }
.year-nav span { font-family:var(--font-display); font-size:1.7rem; min-width:90px; text-align:center; }
.year-nav button {
  width:38px; height:38px; display:flex; align-items:center; justify-content:center;
  border-radius:50%; color:var(--text-muted); transition:background .15s,color .15s;
}
.year-nav button:hover { background:var(--surface-3); color:var(--text); }

.btn-add {
  display:inline-flex; align-items:center; gap:8px;
  background:var(--btc); color:#0D0D0D; font-weight:700; font-size:0.95rem;
  padding:11px 20px; border-radius:var(--radius-sm); transition:background .15s;
}
.btn-add:hover { background:#ffa83d; }

/* LEGEND */
.legend {
  flex-shrink:0;
  padding:11px 28px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:28px;
  background:var(--bg);
}
.legend-item { display:flex; align-items:center; gap:9px; font-size:0.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; font-weight:600; }
.legend-dot { width:9px; height:9px; border-radius:50%; }
.legend-count { margin-left:auto; font-size:0.78rem; color:var(--text-faint); }

/* SCROLL AREA */
.scroll {
  flex:1;
  overflow-y:auto;
  padding:32px 28px 60px;
}
.scroll::-webkit-scrollbar { width:8px; }
.scroll::-webkit-scrollbar-thumb { background:var(--surface-3); border-radius:4px; }

.year-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
  gap:24px;
  max-width:1500px;
  margin:0 auto;
}

/* MONTH CARD */
.month {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:18px;
}
.month-head {
  display:flex; align-items:baseline; justify-content:space-between;
  margin-bottom:14px;
}
.month-name { font-family:var(--font-display); font-size:1.35rem; }
.month-tally { font-size:0.72rem; color:var(--text-faint); font-weight:600; }

.weekdays {
  display:grid; grid-template-columns:repeat(7,1fr);
  margin-bottom:6px;
}
.weekdays div { text-align:center; font-size:0.66rem; color:var(--text-faint); font-weight:700; letter-spacing:0.04em; }

.days {
  display:grid; grid-template-columns:repeat(7,1fr);
  gap:4px;
}
.day {
  aspect-ratio:1;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  border-radius:var(--radius-sm);
  font-size:0.85rem;
  color:var(--text-muted);
  position:relative;
  border:1px solid transparent;
}
.day.empty { border:none; }
.day.event { cursor:pointer; color:var(--text); font-weight:600; border-color:var(--border); background:var(--surface-2); transition:background .12s,border-color .12s; }
.day.event:hover { background:var(--surface-3); border-color:var(--border-hi); }
.day.today { background:var(--btc); color:#0D0D0D; font-weight:700; border-color:var(--btc); }
.day.today.event:hover { background:#ffa83d; }

.day-dots { display:flex; gap:3px; margin-top:3px; }
.day-dots .d { width:5px; height:5px; border-radius:50%; }
.d.key{background:var(--btc)} .d.bitcoin{background:var(--green)} .d.holiday{background:var(--blue)}
.day.today .d.key{background:#0D0D0D} .day.today .d.bitcoin{background:#0D0D0D} .day.today .d.holiday{background:#0D0D0D}

/* MODAL */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.72);
  display:flex; align-items:center; justify-content:center; padding:20px;
  z-index:200; opacity:0; pointer-events:none; transition:opacity .18s;
}
.overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--surface); border:1px solid var(--border-hi);
  border-radius:var(--radius-lg); width:100%; max-width:460px; padding:28px;
  transform:translateY(10px); transition:transform .18s;
}
.overlay.open .modal { transform:translateY(0); }
.modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.modal-date { font-family:var(--font-display); font-size:1.4rem; }
.modal-x { width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:50%; color:var(--text-muted); transition:background .15s,color .15s; }
.modal-x:hover { background:var(--surface-3); color:var(--text); }

.m-event {
  padding:14px 16px; background:var(--surface-2); border-radius:var(--radius-md);
  border-left:3px solid; margin-bottom:10px;
}
.m-event.key{border-color:var(--btc)} .m-event.bitcoin{border-color:var(--green)} .m-event.holiday{border-color:var(--blue)}
.m-event-title { font-weight:600; margin-bottom:4px; }
.m-event-notes { font-size:0.85rem; color:var(--text-muted); line-height:1.5; }

/* FORM */
.fg { margin-bottom:18px; }
.fg label { display:block; font-size:0.72rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; }
.fg input, .fg select, .fg textarea {
  width:100%; background:var(--surface-2); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:12px 14px; font:inherit; font-size:0.95rem; color:var(--text);
  transition:border-color .15s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { outline:none; border-color:var(--btc); }
.fg textarea { resize:vertical; min-height:76px; line-height:1.5; }
.fg select option { background:var(--surface); }
.form-actions { display:flex; gap:12px; justify-content:flex-end; margin-top:24px; }
.btn-ghost { padding:11px 18px; border-radius:var(--radius-sm); color:var(--text-muted); transition:background .15s,color .15s; }
.btn-ghost:hover { background:var(--surface-2); color:var(--text); }

@media (max-width:600px){
  .header{padding:12px 16px} .legend{padding:10px 16px; gap:18px} .scroll{padding:20px 16px 60px}
  .year-grid{grid-template-columns:1fr}
  .logo-text{font-size:1.1rem}
}

/* TOOLTIP */
.tooltip {
  position:fixed;
  z-index:300;
  background:var(--surface-3);
  border:1px solid var(--border-hi);
  border-radius:var(--radius-md);
  padding:10px 14px;
  max-width:260px;
  box-shadow:0 12px 32px rgba(0,0,0,.5);
  pointer-events:none;
  opacity:0;
  transform:translateY(4px);
  transition:opacity .12s ease, transform .12s ease;
}
.tooltip.show { opacity:1; transform:translateY(0); }
.tooltip-row { display:flex; align-items:flex-start; gap:8px; }
.tooltip-row + .tooltip-row { margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
.tooltip-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:6px; }
.tooltip-title { font-size:0.85rem; font-weight:600; color:var(--text); line-height:1.3; }
.tooltip-notes { font-size:0.76rem; color:var(--text-muted); line-height:1.4; margin-top:2px; }

/* ZOOM VIEW */
.zoom {
  position:fixed; inset:0; z-index:250;
  background:var(--bg);
  display:flex; flex-direction:column;
  opacity:0; pointer-events:none;
  transition:opacity .22s ease;
}
.zoom.open { opacity:1; pointer-events:all; }
.zoom-head {
  flex-shrink:0; border-bottom:1px solid var(--border);
  padding:18px 32px; display:flex; align-items:center; gap:20px;
}
.zoom-back {
  display:inline-flex; align-items:center; gap:8px;
  color:var(--text-muted); font-size:0.9rem; font-weight:600;
  padding:9px 16px; border-radius:var(--radius-sm); transition:background .15s,color .15s;
}
.zoom-back:hover { background:var(--surface-2); color:var(--text); }
.zoom-title { font-family:var(--font-display); font-size:2rem; }
.zoom-body { flex:1; overflow-y:auto; padding:32px; }
.zoom-body::-webkit-scrollbar { width:8px; }
.zoom-body::-webkit-scrollbar-thumb { background:var(--surface-3); border-radius:4px; }
.zoom-grid-wrap {
  max-width:1500px; margin:0 auto;
  display:grid; grid-template-columns:minmax(0,2.6fr) minmax(300px,1fr); gap:40px; align-items:start;
}
.zoom-cal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:28px; }
.zoom-weekdays { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:14px; gap:8px; }
.zoom-weekdays div { text-align:left; padding-left:6px; font-size:0.72rem; color:var(--text-faint); font-weight:700; letter-spacing:0.04em; }
.zoom-days { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
.zoom-day {
  min-height:88px; border-radius:var(--radius-md); padding:8px;
  border:1px solid var(--border); background:var(--surface-2);
  display:flex; flex-direction:column; gap:6px;
}
.zoom-day.empty { background:transparent; border-color:transparent; }
.zoom-day.today { border-color:var(--btc); box-shadow:0 0 0 1px var(--btc); }
.zoom-day-num { font-size:0.78rem; font-weight:700; color:var(--text-muted); }
.zoom-day.today .zoom-day-num { color:var(--btc); }
.zoom-pill {
  padding:4px 7px; border-radius:3px; font-size:0.72rem; font-weight:600; line-height:1.3;
  cursor:pointer; transition:opacity .12s;
}
.zoom-pill:hover { opacity:.8; }
.zoom-pill.key{background:var(--btc-dim);color:var(--btc);}
.zoom-pill.bitcoin{background:rgba(62,207,142,.12);color:var(--green);}
.zoom-pill.holiday{background:rgba(77,157,224,.12);color:var(--blue);}
.zoom-sidebar { display:grid; gap:16px; }
.zoom-event-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:20px;
}
.zoom-event-card .type-badge {
  display:inline-block; padding:3px 9px; border-radius:3px; font-size:0.68rem; font-weight:700;
  letter-spacing:0.06em; text-transform:uppercase; margin-bottom:10px;
}
.type-badge.key{background:var(--btc-dim);color:var(--btc);}
.type-badge.bitcoin{background:rgba(62,207,142,.12);color:var(--green);}
.type-badge.holiday{background:rgba(77,157,224,.12);color:var(--blue);}
.zoom-event-title { font-family:var(--font-display); font-size:1.3rem; margin-bottom:8px; }
.zoom-event-date { font-size:0.8rem; color:var(--text-muted); margin-bottom:10px; }
.zoom-event-notes { font-size:0.9rem; color:var(--text-muted); line-height:1.6; }
.zoom-empty { color:var(--text-faint); font-size:0.9rem; text-align:center; padding:40px 0; }

@media (max-width:900px){
  .zoom-grid-wrap { grid-template-columns:1fr; }
  .zoom-head { padding:14px 20px; }
  .zoom-body { padding:20px; }
}
</style>
</head>
<body>

<!-- TOOLTIP -->
<div class="tooltip" id="tip"></div>

<!-- ZOOM VIEW -->
<div class="zoom" id="zoom">
  <div class="zoom-head">
    <button class="zoom-back" onclick="closeZoom()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      All months
    </button>
    <div class="zoom-title" id="zoom-title"></div>
  </div>
  <div class="zoom-body">
    <div class="zoom-grid-wrap">
      <div class="zoom-cal">
        <div class="zoom-weekdays">
          <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div class="zoom-days" id="zoom-days"></div>
      </div>
      <div class="zoom-sidebar" id="zoom-sidebar"></div>
    </div>
  </div>
</div>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <svg viewBox="0 0 64 64" fill="none">
      <path d="M16 18h26c5.5 0 9.5 3 9.5 7.8 0 3.8-2.4 6.3-6 7.3 4.6.9 7.5 3.9 7.5 8.2 0 5.6-4.7 9.7-11.8 9.7H16" stroke="#F7931A" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="24" y1="11" x2="24" y2="53" stroke="#F7931A" stroke-width="4" stroke-linecap="round"/>
      <line x1="34" y1="11" x2="34" y2="53" stroke="#F7931A" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <div class="logo-text">
      Strive
      <span>Internal Calendar</span>
    </div>
  </div>

  <div class="year-nav">
    <button onclick="changeYear(-1)" aria-label="Previous year">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span id="year-label">2026</span>
    <button onclick="changeYear(1)" aria-label="Next year">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <button class="btn-add" onclick="openAdd()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    Add Event
  </button>
</header>

<!-- LEGEND -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--btc)"></div>Key Event</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Bitcoin Date</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Holiday</div>
  <div class="legend-item" style="margin-left:auto;">
    <select id="filter-month" onchange="renderYear()" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);border-radius:var(--radius-sm);padding:6px 10px;font-size:0.8rem;">
      <option value="">All Months</option>
    </select>
  </div>
</div>

<!-- SCROLL AREA -->
<div class="scroll" id="scroll">
  <div class="year-grid" id="year-grid"></div>
</div>

<!-- ADD / EDIT OVERLAY -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-date" id="modal-title">Add Event</div>
      <button class="modal-x" onclick="closeOverlay()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="fg"><label>Title</label><input id="f-title" placeholder="Event name" /></div>
    <div class="fg"><label>Date</label><input id="f-date" type="date" /></div>
    <div class="fg">
      <label>Type</label>
      <select id="f-type">
        <option value="key">Key Event</option>
        <option value="bitcoin">Bitcoin Date</option>
        <option value="holiday">Holiday</option>
      </select>
    </div>
    <div class="fg"><label>Notes (optional)</label><textarea id="f-notes" placeholder="Agenda, owner, context..."></textarea></div>
    <div class="form-actions">
      <button class="btn-ghost" onclick="closeOverlay()">Cancel</button>
      <button class="btn-add" onclick="saveEvent()">Save Event</button>
    </div>
  </div>
</div>

<script>
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let currentYear=new Date().getFullYear();
let events=[];
let editId=null;
const today=new Date();

const tip=document.getElementById('tip');
let tipTimer;

function changeYear(d){currentYear+=d;document.getElementById('year-label').textContent=currentYear;renderYear();populateFilter();if(currentYear===today.getFullYear())setTimeout(()=>scrollToMonth(today.getMonth()),120);}

function populateFilter(){
  const sel=document.getElementById('filter-month');
  const val=sel.value;
  sel.innerHTML='<option value="">All Months</option>';
  MONTHS.forEach((m,i)=>{const o=document.createElement('option');o.value=i;o.textContent=m;sel.appendChild(o);});
  sel.value=val;
}

function scrollToMonth(idx){
  const el=document.querySelector(`[data-month="${idx}"]`);
  if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
}

function renderYear(){
  const grid=document.getElementById('year-grid');
  grid.innerHTML='';
  const filterMonth=document.getElementById('filter-month').value;
  const mStart=filterMonth!==''?parseInt(filterMonth):0;
  const mEnd=filterMonth!==''?parseInt(filterMonth):11;
  for(let m=mStart;m<=mEnd;m++){
    const firstDay=new Date(currentYear,m,1).getDay();
    const daysInMonth=new Date(currentYear,m+1,0).getDate();
    const monthEvents=events.filter(e=>{
      const d=new Date(e.date);
      return d.getFullYear()===currentYear && d.getMonth()===m;
    });
    const mc=document.createElement('div');
    mc.className='month'; mc.dataset.month=m;
    mc.innerHTML=`<div class="month-head"><div class="month-name">${MONTHS[m]}</div><div class="month-tally">${monthEvents.length||''}</div></div><div class="weekdays">${DAYS.map(d=>`<div>${d}</div>`).join('')}</div><div class="days" id="days-${m}"></div>`;
    const daysEl=mc.querySelector(`#days-${m}`);
    for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='day empty';daysEl.appendChild(e);}
    for(let d=1;d<=daysInMonth;d++){
      const dateStr=`${currentYear}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayEvts=events.filter(e=>e.date===dateStr);
      const isToday=today.getFullYear()===currentYear&&today.getMonth()===m&&today.getDate()===d;
      const cell=document.createElement('div');
      cell.className='day'+(dayEvts.length?' event':'')+(isToday?' today':'');
      cell.innerHTML=`<span>${d}</span>${dayEvts.length?`<div class="day-dots">${dayEvts.map(e=>`<div class="d ${e.type}"></div>`).join('')}</div>`:''}`;
      if(dayEvts.length){
        cell.addEventListener('mouseenter',ev=>showTip(ev,dayEvts));
        cell.addEventListener('mouseleave',hideTip);
        cell.addEventListener('click',()=>openZoom(m,d,dayEvts));
      }
      daysEl.appendChild(cell);
    }
    mc.addEventListener('dblclick',e=>{if(!e.target.classList.contains('day'))return;const d=e.target.querySelector('span');if(!d)return;const day=parseInt(d.textContent);if(!day)return;prefillDate(currentYear,m,day);openAdd();});
    grid.appendChild(mc);
  }
}

function showTip(ev,evts){
  clearTimeout(tipTimer);
  tip.innerHTML=evts.map(e=>`<div class="tooltip-row"><div class="tooltip-dot" style="background:${e.type==='bitcoin'?'var(--green)':e.type==='holiday'?'var(--blue)':'var(--btc)'}"></div><div><div class="tooltip-title">${e.title}</div>${e.notes?`<div class="tooltip-notes">${e.notes}</div>`:''}</div></div>`).join('');
  positionTip(ev);
  tip.classList.add('show');
}
function positionTip(ev){
  const x=ev.clientX+14, y=ev.clientY-10;
  const tw=tip.offsetWidth||220;
  tip.style.left=(x+tw>window.innerWidth?window.innerWidth-tw-10:x)+'px';
  tip.style.top=Math.max(0,y)+'px';
}
function hideTip(){tipTimer=setTimeout(()=>tip.classList.remove('show'),80);}

function openZoom(month,day,evts){
  const zoom=document.getElementById('zoom');
  document.getElementById('zoom-title').textContent=MONTHS[month]+' '+currentYear;
  buildZoomCal(month);
  highlightZoomDay(month,day);
  const sb=document.getElementById('zoom-sidebar');
  if(evts.length===0){sb.innerHTML='<p class="zoom-empty">No events this day.</p>';}
  else{sb.innerHTML=evts.map(e=>`<div class="zoom-event-card"><span class="type-badge ${e.type}">${e.type==='key'?'Key Event':e.type==='bitcoin'?'Bitcoin Date':'Holiday'}</span><div class="zoom-event-title">${e.title}</div><div class="zoom-event-date">${formatDate(e.date)}</div>${e.notes?`<div class="zoom-event-notes">${e.notes}</div>`:''}</div>`).join('');}
  zoom.classList.add('open');
}
function closeZoom(){document.getElementById('zoom').classList.remove('open');}

function buildZoomCal(month){
  const container=document.getElementById('zoom-days');
  container.innerHTML='';
  const firstDay=new Date(currentYear,month,1).getDay();
  const daysInMonth=new Date(currentYear,month+1,0).getDate();
  for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='zoom-day empty';container.appendChild(e);}
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${currentYear}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEvts=events.filter(e=>e.date===dateStr);
    const isToday=today.getFullYear()===currentYear&&today.getMonth()===month&&today.getDate()===d;
    const cell=document.createElement('div');
    cell.className='zoom-day'+(isToday?' today':'');
    cell.dataset.day=d;
    cell.innerHTML=`<div class="zoom-day-num">${d}</div>${dayEvts.map(e=>`<div class="zoom-pill ${e.type}" onclick="showEventInSidebar('${e.id}')">${e.title}</div>`).join('')}`;
    container.appendChild(cell);
  }
}
function highlightZoomDay(month,day){const c=document.querySelector(`#zoom-days .zoom-day[data-day="${day}"]`);if(c)c.scrollIntoView({behavior:'smooth',block:'nearest'});}
function showEventInSidebar(id){
  const e=events.find(ev=>ev.id===id);
  if(!e)return;
  const sb=document.getElementById('zoom-sidebar');
  sb.innerHTML=`<div class="zoom-event-card"><span class="type-badge ${e.type}">${e.type==='key'?'Key Event':e.type==='bitcoin'?'Bitcoin Date':'Holiday'}</span><div class="zoom-event-title">${e.title}</div><div class="zoom-event-date">${formatDate(e.date)}</div>${e.notes?`<div class="zoom-event-notes">${e.notes}</div>`:''}</div>`;
}

let addPrefillDate=null;
function prefillDate(y,m,d){addPrefillDate=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

function openAdd(){editId=null;document.getElementById('modal-title').textContent='Add Event';document.getElementById('f-title').value='';document.getElementById('f-date').value=addPrefillDate||'';document.getElementById('f-type').value='key';document.getElementById('f-notes').value='';addPrefillDate=null;document.getElementById('overlay').classList.add('open');setTimeout(()=>document.getElementById('f-title').focus(),60);}
function closeOverlay(){document.getElementById('overlay').classList.remove('open');}

function saveEvent(){
  const title=document.getElementById('f-title').value.trim();
  const date=document.getElementById('f-date').value;
  const type=document.getElementById('f-type').value;
  const notes=document.getElementById('f-notes').value.trim();
  if(!title||!date){alert('Title and date are required.');return;}
  if(editId){
    const i=events.findIndex(e=>e.id===editId);
    if(i>-1)events[i]={...events[i],title,date,type,notes};
  } else {
    events.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2),title,date,type,notes});
  }
  closeOverlay();
  renderYear();
}

function formatDate(ds){
  const d=new Date(ds+'T12:00:00');
  return d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

populateFilter();
renderYear();
if(currentYear===today.getFullYear())setTimeout(()=>scrollToMonth(today.getMonth()),120);
</script>
</body>
</html>
